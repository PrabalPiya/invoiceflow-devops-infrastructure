apiVersion: v1
kind: Secret
metadata:
  name: secrets
  namespace: invoiceflow
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: invoiceflow
  DATABASE_URL: postgresql://postgres:postgres@invoicepostgres:5432/invoiceflow
  JWT_SECRET: invoiceflow_secret_key
  JWT_EXPIRES_IN: 7d